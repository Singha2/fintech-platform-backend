spring.application.name=platform-backend

# --- Datasource ---
# Defaults are the docker-compose dev values.
# Override for cloud/CI by setting these environment variables:
#   SPRING_DATASOURCE_URL      e.g. jdbc:postgresql://<host>:5432/platform
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:platform}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:avc@2026}

# --- JPA: the SQL bundle / Flyway own the schema; Hibernate only validates ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway owns migrations under classpath:db/migration ---
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true

# --- Inbound-webhook HMAC (B4 §5; WS-5) ---
# Per-vendor shared secret for verifying escrow/banking callbacks. Real per-vendor secrets come from the
# secrets manager at the Production gate; this dev default is for local + tests only.
platform.webhook.banking.secret=${PLATFORM_WEBHOOK_BANKING_SECRET:dev-banking-webhook-secret-change-me}

# --- Bootstrap admin API key (break-glass) ---
# Static key gating POST /bootstrap/admin-users, which provisions the first active admin (identity + role +
# password) before any super_admin exists. Present it as `Authorization: Bearer <key>`. This local default is
# read straight from config; in production override PLATFORM_BOOTSTRAP_API_KEY from a secret manager / vault.
platform.bootstrap.api-key=${PLATFORM_BOOTSTRAP_API_KEY:local-bootstrap-key-change-me}

# --- Documents (BC16, M18b) ---
# I4 upload size guard for PUT /documents/{id}/content. 20 MB default; tests pin this smaller to exercise
# the cap without a 20 MB fixture. Direct-to-GCS (M18c, Production gate) enforces its own presigned-URL cap.
documents.max-upload-bytes=${DOCUMENTS_MAX_UPLOAD_BYTES:20971520}
