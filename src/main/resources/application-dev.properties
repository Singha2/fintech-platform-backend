# Dev profile — activate with:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#                          or:  SPRING_PROFILES_ACTIVE=dev ./mvnw spring-boot:run
#
# Activating 'dev' wires DevDataSeeder (seeds admins + counterparties on startup if the DB is empty) and
# DevController (/dev/last-otp, /dev/seed-info). Neither bean exists in any other profile. See
# docs/MANUAL_TESTING.md.

# Verbose, so you can watch each command flow through the gateway/services in the run console.
logging.level.com.arthvritt.platform=DEBUG
# The stub notifier logs sent notifications (param keys only) at DEBUG — handy to see OTP/ack sends fire.
logging.level.com.arthvritt.platform.notification.StubNotifier=DEBUG

# --- File logging (dev only) ---
# The file appender is declared in logback-spring.xml (a custom logback config overrides Spring Boot's
# logging.file.name, so setting it here would do nothing). It writes logs/backend-dev.log (git-ignored),
# gated to the 'dev' profile. Change the path/rotation there.
